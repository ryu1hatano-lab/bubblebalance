<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BubbleBalance</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080c10; --bg2: #0c1520; --bg3: #0f1923;
    --border: #16242f; --border2: #243040;
    --text: #dde3ea; --muted: #3d5566; --dim: #243040;
    --blue: #4fc3f7; --orange: #ffa726; --green: #66bb6a;
    --red: #ef5350; --purple: #ce93d8; --brown: #a1887f;
    --teal: #80cbc4; --yellow: #fff176;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text);
    font-family: 'IBM Plex Mono', 'Courier New', monospace; font-size: 13px; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* Layout */
  #app { display: flex; flex-direction: column; height: 100vh; }
  #header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 13px 24px; display: flex; align-items: center; gap: 14px; flex-shrink: 0;
  }
  #header .suit { font-size: 22px; color: #2d5a7a; }
  .note-link {
    margin-left: auto;
    display: flex; align-items: center; gap: 8px;
    padding: 7px 14px; border-radius: 4px;
    background: #1a1a1a; border: 1px solid #333;
    color: #dde3ea; text-decoration: none;
    font-size: 12px; letter-spacing: 0.04em;
    transition: all 0.15s;
  }
  .note-link:hover { background: #252525; border-color: #555; color: #fff; }
  .note-link .note-icon {
    width: 22px; height: 22px; border-radius: 50%;
    background: #41c9b4; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 900; color: #000; flex-shrink: 0;
  }
  #header h1 { font-family: 'Bebas Neue'; font-size: 23px; letter-spacing: 0.12em; color: var(--blue); line-height: 1; }
  #header p  { font-size: 9px; color: #2d4a5a; letter-spacing: 0.1em; margin-top: 2px; }
  #main { display: flex; flex: 1; min-height: 0; }

  /* Left panel */
  #left {
    width: 300px; flex-shrink: 0; background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 16px 14px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 16px;
  }
  .sec {
    font-family: 'Bebas Neue'; font-size: 11px; letter-spacing: 0.18em;
    color: var(--muted); border-bottom: 1px solid var(--border);
    padding-bottom: 4px; margin-bottom: 9px;
  }
  input, select, textarea {
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text); padding: 5px 8px; border-radius: 3px;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    outline: none; transition: border-color 0.2s; width: 100%;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--blue); }
  input[type=number] { -moz-appearance: textfield; }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

  /* Player row */
  .player-row {
    display: grid; grid-template-columns: 22px 28px 1fr 70px 26px;
    gap: 6px; align-items: center; margin-bottom: 6px;
    padding: 7px 9px; border-radius: 4px; background: var(--bg3);
    border: 1px solid var(--border);
  }
  .dead-label { font-size: 9px; color: #3a8a6a; letter-spacing:0.04em; text-align:center; }
  .dead-input {
    width: 100%; font-size: 13px; text-align: center;
    background: var(--bg); border: 1px solid #2a4a3a; color: #80cbc4;
    border-radius: 3px; padding: 4px 2px;
  }
  .pot-display {
    margin-top: 8px; padding: 8px 10px; background: var(--bg2);
    border: 1px solid #2d5a3a; border-radius: 4px; font-size: 11px;
  }
  .player-dot {
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; color: #000; flex-shrink: 0;
  }
  .player-name-label {
    font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: 0.04em;
  }
  input.stack-input {
    font-size: 14px; font-weight: 600; text-align: center;
    padding: 6px 4px; width: 100%; min-width: 0;
  }
  .del-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 3px; cursor: pointer; font-size: 11px; padding: 2px 6px;
    transition: all 0.12s; font-family: 'IBM Plex Mono', monospace;
  }
  .del-btn:hover { border-color: #ef535044; color: var(--red); }
  .add-btn {
    width: 100%; background: none; border: 1px dashed #1e3020; color: #2d5030;
    border-radius: 3px; cursor: pointer; font-size: 11px; padding: 6px;
    font-family: 'IBM Plex Mono', monospace; transition: all 0.15s;
  }
  .add-btn:hover { border-color: #66bb6a44; color: var(--green); }

  /* Preset buttons */
  .preset-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 9px; }
  .preset-btn {
    flex: 1; padding: 5px 6px; border-radius: 3px; cursor: pointer; font-size: 9px;
    font-family: 'IBM Plex Mono', monospace; border: 1px solid var(--border2);
    background: var(--bg3); color: var(--muted); transition: all 0.15s;
    white-space: nowrap; letter-spacing: 0.02em;
  }
  .preset-btn.active { background: #091828; border-color: #4fc3f766; color: var(--blue); }
  .preset-btn:hover:not(.active) { border-color: var(--muted); color: #7a9ab0; }

  /* Generate button */
  .gen-btn {
    width: 100%; padding: 11px; background: var(--blue); color: #060c10;
    border: none; border-radius: 4px; cursor: pointer; font-size: 13px;
    font-family: 'Bebas Neue'; letter-spacing: 0.15em; transition: background 0.15s;
  }
  .gen-btn:hover { background: #81d4fa; }

  /* Error */
  .error-box {
    padding: 7px 10px; background: #150808; border: 1px solid #ef535022;
    border-radius: 3px; color: var(--red); font-size: 10px;
  }

  /* Tag */
  .tag {
    font-size: 9px; padding: 1px 5px; border-radius: 2px;
    letter-spacing: 0.05em; font-weight: 600; white-space: nowrap;
  }
  .tag-hero    { background: #0a2030; color: var(--blue);   border: 1px solid #4fc3f733; }
  .tag-villain { background: #1e1200; color: var(--orange); border: 1px solid #ffa72633; }
  .tag-obs     { background: #111827; color: var(--muted);  border: 1px solid #1e2d3d; }

  /* EV row */
  .ev-row {
    display: flex; align-items: center; gap: 7px;
    margin-bottom: 5px; font-size: 11px;
  }
  .ev-line { width: 20px; height: 2px; flex-shrink: 0; }

  /* Pot selector */
  .pot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .pot-label { font-size: 9px; margin-bottom: 5px; letter-spacing: 0.06em; }

  /* Right panel */
  #right { flex: 1; padding: 18px 20px; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
  #chart-title { margin-bottom: 12px; }
  #chart-title h2 { font-family: 'Bebas Neue'; font-size: 18px; letter-spacing: 0.1em; color: #c0cdd8; }
  #bottom-panel {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
    flex-shrink: 0;
  }
  .bf-card {
    background: var(--bg2); border-radius: 5px;
    padding: 12px 14px; border: 1px solid var(--border);
  }
  .bf-card-title {
    font-family: 'Bebas Neue'; font-size: 11px; letter-spacing: 0.15em;
    margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid var(--border);
  }
  .bf-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 5px; font-size: 11px;
  }
  .bf-row .label { color: var(--muted); font-size: 10px; }
  .bf-row .val   { font-size: 13px; font-weight: 600; }
  .bf-big {
    margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .bf-big .label { color: var(--muted); font-size: 10px; letter-spacing: 0.05em; }
  .bf-big .val   { font-size: 18px; font-weight: 700; }
  .obs-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 4px; font-size: 11px;
  }
  .obs-name { display: flex; align-items: center; gap: 5px; }
  .obs-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cursor-pos {
    font-size: 10px; color: var(--muted); margin-bottom: 8px; padding-bottom: 5px;
    border-bottom: 1px solid var(--border); font-family: 'Bebas Neue'; letter-spacing: 0.1em;
  }
  #chart-title .sub1 { font-size: 9px; color: var(--dim); margin-top: 2px; }
  #chart-title .sub2 { font-size: 9px; color: #4fc3f733; margin-top: 1px; }
  #chart-wrap { flex: 1; min-height: 0; position: relative; }
  canvas#myChart { width: 100% !important; height: 100% !important; }

  /* Metric cards */
  #metrics {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 8px; margin-top: 12px; flex-shrink: 0;
  }
  .metric-card {
    padding: 10px 12px; background: var(--bg2); border-radius: 4px;
    border: 1px solid transparent;
  }
  .metric-card-title { font-size: 9px; font-weight: 600; letter-spacing: 0.07em; margin-bottom: 7px; }
  .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .metric-item-label { font-size: 8px; color: var(--dim); margin-bottom: 1px; }
  .metric-item-val { font-size: 13px; }

  /* Prize list */
  .prize-list { font-size: 10px; color: var(--muted); line-height: 1.9; }
  .prize-list-row { display: flex; justify-content: space-between; max-width: 175px; }
  .prize-list-rank { color: var(--dim); }

  #custom-prize-wrap { display: none; }
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div id="header">
    <span class="suit">♠</span>
    <div>
      <h1>BubbleBalance</h1>
      <p>ICM Asymmetry Visualizer · POKER MTT · INDEPENDENT CHIP MODEL</p>
    </div>
    <a class="note-link" href="https://note.com/ryu1poker_2nd" target="_blank" rel="noopener">
      <div class="note-icon">n</div>
      Hatano【poker上級基礎戦略】
    </a>
  </div>

  <div id="main">
    <!-- Left Panel -->
    <div id="left">

      <!-- Players -->
      <div>
        <div class="sec">PLAYERS (MAX 8)</div>
        <div id="players-list"></div>
      <div class="pot-display" id="pot-display" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="color:var(--muted);font-size:10px;letter-spacing:0.08em">DEAD MONEY POT</span>
          <span class="pot-val" id="pot-val">—</span>
        </div>
        <div style="font-size:9px;color:var(--dim);margin-top:3px" id="pot-detail"></div>
      </div>
        <div style="text-align:right;font-size:9px;color:var(--dim);margin-bottom:5px">単位: BB</div>
        <button class="add-btn" id="add-player-btn" onclick="addPlayer()">＋ プレイヤー追加</button>
      </div>

      <!-- Pot players -->
      <div>
        <div class="sec">POT PLAYERS</div>
        <div class="pot-grid">
          <div>
            <div class="pot-label" style="color:var(--blue)">HERO <span style="color:var(--dim)">破線・反転</span></div>
            <select id="hero-sel" onchange="render()"></select>
          </div>
          <div>
            <div class="pot-label" style="color:var(--orange)">VILLAIN</div>
            <select id="villain-sel" onchange="render()"></select>
          </div>
        </div>
        <div style="margin-top:7px;font-size:9px;color:var(--dim);line-height:1.7" id="pot-hint"></div>
      </div>

      <!-- Prize structure -->
      <div>
        <div class="sec">PRIZE STRUCTURE</div>
        <div class="preset-row">
          <button class="preset-btn active" id="btn-mtt1000" onclick="setPrize('mtt1000')">MTT 1000</button>
          <button class="preset-btn"        id="btn-mtt200"   onclick="setPrize('mtt200')">MTT 200</button>
          <button class="preset-btn"        id="btn-satellite" onclick="setPrize('satellite')">サテライト</button>
          <button class="preset-btn"        id="btn-custom"   onclick="setPrize('custom')">手入力</button>
        </div>
        <div id="prize-list-wrap" class="prize-list"></div>
        <div id="satellite-wrap" style="display:none">
          <div style="font-size:9px;color:var(--dim);margin-bottom:6px">通過人数を入力（全員に同額）</div>
          <div style="display:flex;align-items:center;gap:8px">
            <input type="number" id="satellite-seats" value="3" min="1"
              style="width:60px;font-size:15px;font-weight:600;text-align:center"
              oninput="updateSatellitePrizes()">
            <span style="font-size:11px;color:var(--muted)">人通過</span>
          </div>
          <div id="satellite-prize-info" style="font-size:10px;color:var(--muted);margin-top:6px"></div>
        </div>
        <div id="custom-prize-wrap">
          <div style="font-size:9px;color:var(--dim);margin-bottom:5px">1位から順にカンマ区切り</div>
          <textarea id="custom-prizes" rows="3" >30380, 21920, 15880, 11520, 8340, 6120</textarea>
        </div>
      </div>

      <!-- Generate -->
      <button class="gen-btn" onclick="generate()">▶ GENERATE</button>
      <div id="error-box" class="error-box" style="display:none"></div>

      <!-- EV table -->
      <div id="ev-section" style="display:none">
        <div class="sec">CURRENT ICM $EV</div>
        <div id="ev-list"></div>
      </div>

    </div><!-- /left -->

    <!-- Right Panel -->
    <div id="right">
      <div id="chart-title">
        <h2 id="title-text">—</h2>
        <div class="sub1" id="prize-sub"></div>
        <div class="sub2" id="mirror-sub"></div>
      </div>
      <div id="chart-wrap">
        <canvas id="myChart"></canvas>
      </div>
      <div id="bottom-panel"></div>
    </div>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const COLORS = ["#4fc3f7","#ffa726","#66bb6a","#ef5350","#ce93d8","#a1887f","#80cbc4","#fff176"];
const POSITION_LABELS = {
  2: ["SB","BB"],
  3: ["BTN","SB","BB"],
  4: ["CO","BTN","SB","BB"],
  5: ["UTG","CO","BTN","SB","BB"],
  6: ["UTG","HJ","CO","BTN","SB","BB"],
  7: ["UTG","UTG+1","HJ","CO","BTN","SB","BB"],
  8: ["UTG","UTG+1","UTG+2","HJ","CO","BTN","SB","BB"],
};
const LABELS = ["UTG","HJ","CO","BTN","SB","BB","UTG+1","UTG+2"];

function relabelPlayers() {
  const n = players.length;
  const labels = POSITION_LABELS[n] || LABELS.slice(0, n);
  players.forEach((p, i) => { p.label = labels[i]; });
}

const PRESETS = {
  mtt1000: { label: "MTT 1000 players", values: [30380,21920,15880,11520,8340,6120,4480,3280,2780] },
  mtt200:  { label: "MTT 200 players",  values: [7656,5668,4196,3204,2456,1924,1484,1140,888] },
  custom:  { label: "手入力",            values: null },
};
let satelliteMode = false; // satellite Y-axis mode

// ── State ──────────────────────────────────────────────────────────────────
let players = [
  {label:"UTG",stack:35,dead:0},{label:"HJ",stack:20,dead:0},
  {label:"CO", stack:20,dead:0},{label:"BTN",stack:15,dead:0},
  {label:"SB", stack:12,dead:0.5},{label:"BB",stack:10,dead:1},
];
// relabel called after POSITION_LABELS is defined
let heroIdx = 0, villainIdx = 1;
let prizeMode = "mtt1000";
let chart = null;

// ── ICM ────────────────────────────────────────────────────────────────────
function calcICM(stacks, prizes) {
  const memo = new Map();
  const tagged = stacks.map((s,i) => ({v:s,idx:i}));
  function icm2(ts, pi) {
    if (pi >= prizes.length || ts.length === 0) return {};
    const key = ts.map(t=>t.idx+":"+t.v).join(",")+"|"+pi;
    if (memo.has(key)) return memo.get(key);
    const total = ts.reduce((a,t)=>a+t.v, 0);
    const result = {};
    const prize = prizes[pi];
    for (let i = 0; i < ts.length; i++) {
      const prob = ts[i].v / total;
      const next = [...ts.slice(0,i),...ts.slice(i+1)];
      const sub = icm2(next, pi+1);
      const idx = ts[i].idx;
      result[idx] = (result[idx]||0) + prob * prize;
      for (const [k,v] of Object.entries(sub))
        result[k] = (result[k]||0) + prob * v;
    }
    memo.set(key, result);
    return result;
  }
  const res = icm2(tagged, 0);
  return stacks.map((_,i) => res[i]||0);
}

// ── Prize helpers ──────────────────────────────────────────────────────────
function getSatelliteSeats() {
  return parseInt(document.getElementById("satellite-seats")?.value) || 3;
}

function updateSatellitePrizes() {
  const seats = getSatelliteSeats();
  const totalPlayers = players.length;
  // prize = 100 per seat (normalized), 0 for busted
  const info = document.getElementById("satellite-prize-info");
  if (info) info.textContent = `${seats}人通過 / ${totalPlayers}人中 → 通過率表示に切替`;
}

function getPrizeList() {
  if (prizeMode === "satellite") {
    const seats = getSatelliteSeats();
    // Add tiny tiebreak (0.0001) to stabilize Malmuth-Harville with equal prizes
    const prizes = [];
    for (let i = 0; i < seats; i++) prizes.push(100 - i * 0.0001);
    return prizes;
  }
  if (prizeMode === "custom") {
    return document.getElementById("custom-prizes").value
      .split(/[,\s\/]+/).map(s=>s.trim()).filter(Boolean).map(Number);
  }
  return PRESETS[prizeMode].values;
}

function setPrize(mode) {
  prizeMode = mode;
  ["mtt1000","mtt200","satellite","custom"].forEach(k => {
    const el = document.getElementById("btn-"+k);
    if (el) el.classList.toggle("active", k===mode);
  });
  const listWrap = document.getElementById("prize-list-wrap");
  const customWrap = document.getElementById("custom-prize-wrap");
  const satWrap = document.getElementById("satellite-wrap");
  if (mode === "custom") {
    satelliteMode = false;
    listWrap.innerHTML = "";
    customWrap.style.display = "block";
    satWrap.style.display = "none";
  } else if (mode === "satellite") {
    satelliteMode = true;
    listWrap.innerHTML = "";
    customWrap.style.display = "none";
    satWrap.style.display = "block";
    updateSatellitePrizes();
  } else {
    satelliteMode = false;
    customWrap.style.display = "none";
    satWrap.style.display = "none";
    listWrap.innerHTML = PRESETS[mode].values.map((v,i)=>
      `<div class="prize-list-row"><span class="prize-list-rank">${i+1}位</span><span>$${v.toLocaleString()}</span></div>`
    ).join("");
  }
}

// ── Player list rendering ──────────────────────────────────────────────────
function renderPlayerList() {
  const list = document.getElementById("players-list");
  list.innerHTML = players.map((p,i) => `
    <div class="player-row" style="border-color:${i===heroIdx?'#4fc3f71a':i===villainIdx?'#ffa7261a':'var(--border)'}">
      <div class="player-dot" style="background:${COLORS[i]}">${p.label.charAt(0)}</div>
      <span class="player-name-label" style="color:${COLORS[i]}">${p.label}</span>
      <input type="number" value="${p.stack}" min="1" oninput="updateStack(${i},this.value)"
        class="stack-input" style="width:100%">
      <div style="display:flex;flex-direction:column;align-items:center;gap:1px">
        <div class="dead-label">DEAD</div>
        <input type="number" value="${p.dead||0}" min="0" step="0.5" oninput="updateDead(${i},this.value)"
          class="dead-input">
      </div>
      <button class="del-btn" onclick="removePlayer(${i})">✕</button>
    </div>
  `).join("");

  document.getElementById("add-player-btn").style.display = players.length >= 8 ? "none" : "block";
  updatePotDisplay();

  // Selects
  const heroSel = document.getElementById("hero-sel");
  const vilSel  = document.getElementById("villain-sel");
  const opts = players.map((p,i)=>{ const n=p.name?` ${p.name}`:''; return `<option value="${i}">${p.label}${n} (${p.stack}bb)</option>`; }).join("");
  heroSel.innerHTML = opts;
  vilSel.innerHTML  = opts;
  heroSel.value = heroIdx;
  vilSel.value  = villainIdx;

  heroSel.onchange = () => { heroIdx = +heroSel.value; renderPlayerList(); };
  vilSel.onchange  = () => { villainIdx = +vilSel.value; renderPlayerList(); };

  document.getElementById("pot-hint").innerHTML =
    `X軸正方向 = ${players[heroIdx]?.label}がチップ獲得 / ${players[villainIdx]?.label}がチップ喪失<br>
     ヒーロー線のみX軸を反転し重ねて表示 → 非対称性を可視化`;
}

function updateLabel(i, v) { players[i].label = v; renderPlayerList(); }
function updateName(i, v) { players[i].name = v; renderPlayerList(); }
function updateDead(i, v) {
  players[i].dead = v === "" ? 0 : Number(v);
  updatePotDisplay();
}

function updatePotDisplay() {
  const totalDead = players.reduce((s,p) => s + (p.dead||0), 0);
  const potEl = document.getElementById("pot-display");
  const potVal = document.getElementById("pot-val");
  const potDetail = document.getElementById("pot-detail");
  if (totalDead > 0) {
    potEl.style.display = "block";
    potVal.textContent = totalDead.toFixed(1) + " BB";
    const parts = players
      .filter(p => (p.dead||0) > 0)
      .map(p => `${p.label}: ${p.dead}bb`).join("  ");
    potDetail.textContent = parts;
  } else {
    potEl.style.display = "none";
  }
}

function updateStack(i, v) {
  players[i].stack = v === "" ? "" : Number(v);
  // Update selects without full re-render to preserve input focus
  const heroSel = document.getElementById("hero-sel");
  const vilSel  = document.getElementById("villain-sel");
  const opts = players.map((p,idx)=>{ return `<option value="${idx}">${p.label} (${p.stack}bb)</option>`; }).join("");
  heroSel.innerHTML = opts; heroSel.value = heroIdx;
  vilSel.innerHTML  = opts; vilSel.value  = villainIdx;
}

function addPlayer() {
  if (players.length >= 8) return;
  players.push({ label: "P", stack: 12, dead: 0 });
  relabelPlayers();
  renderPlayerList();
}

function removePlayer(i) {
  if (players.length <= 2) return;
  players.splice(i, 1);
  if (heroIdx === i)    heroIdx = 0;
  if (villainIdx === i) villainIdx = Math.min(1, players.length-1);
  if (heroIdx >= players.length)    heroIdx = 0;
  if (villainIdx >= players.length) villainIdx = Math.min(1, players.length-1);
  relabelPlayers();
  renderPlayerList();
}

// ── Generate ───────────────────────────────────────────────────────────────
function showError(msg) {
  const box = document.getElementById("error-box");
  box.style.display = msg ? "block" : "none";
  box.textContent = msg ? "⚠ " + msg : "";
}

function generate() {
  showError("");
  try {
    const rawPrizeList = getPrizeList();
    if (!rawPrizeList || rawPrizeList.some(isNaN) || rawPrizeList.length === 0)
      throw new Error("賞金構造が無効です");
    const stacks = players.map(p => Number(p.stack) - Number(p.dead||0));
    // Scale prizes so min value >= 1000 to avoid floating point rounding issues
    const prizeScale = Math.max(1, 1000 / Math.min(...rawPrizeList.filter(v=>v>0)));
    const prizeList = rawPrizeList.map(v => v * prizeScale);
    if (stacks.some(isNaN) || stacks.some(s => s <= 0))
      throw new Error("スタックが無効です");
    if (heroIdx === villainIdx)
      throw new Error("ヒーローとビランは別のプレイヤーにしてください");

    const chipRange = Math.min(stacks[heroIdx], stacks[villainIdx]);
    const steps = 80;

    // raw ICM map
    const rawMap = new Map();
    for (let step = -steps; step <= steps; step++) {
      const delta = parseFloat(((step / steps) * chipRange).toFixed(3));
      const s = [...stacks];
      s[heroIdx]    = Math.max(0.01, stacks[heroIdx]    + delta);
      s[villainIdx] = Math.max(0.01, stacks[villainIdx] - delta);
      rawMap.set(delta, calcICM(s, prizeList));
    }

    // Build data arrays
    const xLabels = [];
    const heroData = [];
    const heroNormalData = [];
    const seriesData = players.map(() => []); // indexed by player

    for (let step = -steps; step <= steps; step++) {
      const delta = parseFloat(((step / steps) * chipRange).toFixed(3));
      const neg   = parseFloat((-(step / steps) * chipRange).toFixed(3));
      const icmNow = rawMap.get(delta);
      const icmMir = rawMap.get(neg) || icmNow;

      xLabels.push(delta);
      const rnd = v => v / prizeScale;
      heroNormalData.push(rnd(icmNow[heroIdx]));
      heroData.push(rnd(icmMir[heroIdx]));
      players.forEach((p, i) => {
        if (i !== heroIdx) seriesData[i].push(rnd(icmNow[i]));
      });
    }

    // Build chart datasets
    const datasets = [];

    const pName = (p) => p.label;
    // Hero (solid, normal direction)
    datasets.push({
      label: `${pName(players[heroIdx])} (${effStack(players[heroIdx])}bb)`,
        _playerIdx: heroIdx,
      data: heroNormalData,
      borderColor: COLORS[heroIdx],
      borderWidth: 4,
      borderDash: [],
      pointRadius: 0,
      pointHoverRadius: 4,
      tension: 0.4,
    });
    // Hero (dashed, mirrored)
    datasets.push({
      label: `${pName(players[heroIdx])} (${effStack(players[heroIdx])}bb) [反転]`,
        _playerIdx: heroIdx,
        _mirror: true,
      data: heroData,
      borderColor: COLORS[heroIdx],
      borderWidth: 5,
      borderDash: [10, 4],
      pointRadius: 0,
      pointHoverRadius: 4,
      tension: 0.4,
    });

    // Others
    players.forEach((p, i) => {
      if (i === heroIdx) return;
      datasets.push({
        label: `${pName(p)} (${effStack(p)}bb)`,
          _playerIdx: i,
        data: seriesData[i],
        borderColor: COLORS[i],
        borderWidth: i === villainIdx ? 5 : 3,
        borderDash: [],
        pointRadius: 0,
        pointHoverRadius: 3,
        tension: 0.4,
      });
    });

    drawChart(xLabels, datasets, chipRange, rawPrizeList, stacks);
    updateEVTable(prizeList, stacks, prizeScale);
    updateMetrics(xLabels, heroData, heroNormalData, seriesData, prizeList, stacks, chipRange, prizeScale);

  } catch(e) {
    showError(e.message);
  }
}

// ── Chart ──────────────────────────────────────────────────────────────────
function effStack(p) { return Number(p.stack) - Number(p.dead||0); }

function drawChart(xLabels, datasets, chipRange, prizeList, stacks) {
  const heroP    = players[heroIdx];
  const villainP = players[villainIdx];

  // Title
  document.getElementById("title-text").textContent =
    `${heroP.label} →D — [${players.map(p=>`${p.label}(${effStack(p)}bb)`).join(", ")}]`;
  document.getElementById("prize-sub").textContent =
    "Prizes: " + prizeList.slice(0,6).map(v=>"$"+v.toLocaleString()).join(" / ")
    + (prizeList.length>6?" …":"") + `  ·  移動範囲: ±${chipRange}BB`;
  document.getElementById("mirror-sub").textContent =
    `破線(${heroP.label}): X軸反転 — 右端 = ${heroP.label} チップ全獲得 / 左端 = 全喪失`;

  if (chart) { chart.destroy(); chart = null; }

  const ctx = document.getElementById("myChart").getContext("2d");
  chart = new Chart(ctx, {
    type: "line",
    data: { labels: xLabels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 400 },
      layout: { padding: { top: 28 } },
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: {
          display: false,
        },
        tooltip: {
          backgroundColor: "#0c1520",
          borderColor: "#243040", borderWidth: 1,
          titleColor: "#4fc3f7",
          bodyColor: "#dde3ea",
          titleFont: { family: "'IBM Plex Mono'", size: 12 },
          bodyFont:  { family: "'IBM Plex Mono'", size: 12 },
          usePointStyle: false,
          boxWidth: 12, boxHeight: 12,
          callbacks: {
            labelColor(item) {
              return { borderColor: item.dataset.borderColor, backgroundColor: item.dataset.borderColor, borderWidth: 0 };
            },
            title: items => {
              const v = parseFloat(items[0].label);
              const dead = players.reduce((s,p) => s + (Number(p.dead)||0), 0);
              const pot = dead + Math.abs(v) * 2;
              const potStr = pot > 0 ? `  |  POT: ${pot.toFixed(1)}bb` : "";
              return `${heroP.label}の移動: ${v > 0 ? "+" : ""}${v} BB${potStr}`;
            },
            label: item => {
              const v = parseFloat(item.chart.data.labels[item.dataIndex]);
              const pIdx = item.dataset._playerIdx;
              let stackStr = "";
              if (pIdx !== undefined && players[pIdx]) {
                const eff = effStack(players[pIdx]);
                const isMirror = item.dataset._mirror;
                if (isMirror) {
                  stackStr = `${(eff - v).toFixed(1)}bb`;
                } else if (pIdx === heroIdx) {
                  stackStr = `${(eff + v).toFixed(1)}bb`;
                } else if (pIdx === villainIdx) {
                  stackStr = `${(eff - v).toFixed(1)}bb`;
                } else {
                  stackStr = `${eff}bb`;
                }
              }
              const base = item.dataset.label.split(" (")[0];
              const evStr = satelliteMode ? `${Number(item.raw).toFixed(2)}%` : `$${sig4(Number(item.raw))}`;
              return stackStr ? ` ${base} (${stackStr}): ${evStr}` : ` ${item.dataset.label}: ${evStr}`;
            },
          }
        }
      },
      scales: {
        x: {
          type: "linear",
          min: -chipRange,
          max: chipRange,
          grid: { color: "#1e3a50", lineWidth: 1.5 },
          ticks: {
            color: "#9dc4d8",
            font: { family: "'IBM Plex Mono'", size: 20 },
            callback: v => v > 0 ? "+"+v : v,
            maxTicksLimit: 12,
          },
          title: {
            display: true,
            text: `移動チップ量 [BB]   (正方向 = ${heroP.label} 獲得 / ${villainP.label} 喪失)`,
            color: "#9dc4d8",
            font: { family: "'IBM Plex Mono'", size: 18 },
            padding: { top: 10 },
          },
          border: { color: "#2d5a7a" },
        },
        y: {
          grid: { color: "#1e3a50", lineWidth: 1.5 },
          ticks: {
            color: "#9dc4d8",
            font: { family: "'IBM Plex Mono'", size: 20 },
            callback: v => satelliteMode ? v.toFixed(1)+"%" : (v >= 1000 ? (v/1000).toFixed(0)+"k" : v),
          },
          title: {
            display: true, text: satelliteMode ? "通過率 [%]" : "ICM $EV [USD]",
            color: "#9dc4d8",
            font: { family: "'IBM Plex Mono'", size: 18 },
          },
          border: { color: "#2d5a7a" },
        }
      }
    },
    plugins: [{
      id: "customLegend",
      afterDraw(chart) {
        const {ctx, chartArea: {left, right, top}, data: {datasets}} = chart;
        const font = "12px 'IBM Plex Mono', monospace";
        ctx.save();
        ctx.font = font;
        const boxSize = 12;
        const padX = 10;
        const padBetween = 18;
        // measure all items to right-align
        const items = datasets.map((ds, i) => ({
          label: ds.label,
          color: ds.borderColor,
          dashed: (ds.borderDash && ds.borderDash.length > 0),
          hidden: !chart.isDatasetVisible(i),
        }));
        // layout: pack items left to right, starting from right side
        const itemWidths = items.map(it => boxSize + 5 + ctx.measureText(it.label).width + padBetween);
        const totalW = itemWidths.reduce((a,b)=>a+b,0) - padBetween;
        let x = Math.max(left, (left + right) / 2 - totalW / 2);
        const y = 8;
        items.forEach((it, i) => {
          const alpha = it.hidden ? 0.3 : 1;
          ctx.globalAlpha = alpha;
          // filled box
          ctx.fillStyle = it.color;
          ctx.fillRect(x, y, boxSize, boxSize);
          // if dashed, draw a dash overlay
          if (it.dashed) {
            ctx.fillStyle = "#0c1520";
            ctx.fillRect(x + 3, y + 4, 6, 4);
            ctx.fillStyle = it.color;
            ctx.fillRect(x, y + 4, 4, 4);
            ctx.fillRect(x + 7, y + 4, 5, 4);
          }
          // label text
          ctx.fillStyle = "#9ab8cc";
          ctx.textBaseline = "middle";
          ctx.fillText(it.label, x + boxSize + 5, y + boxSize / 2);
          x += itemWidths[i];
        });
        ctx.globalAlpha = 1;
        ctx.restore();
      }
    },{
      id: "zeroline",
      afterDraw(chart) {
        const {ctx, scales: {x, y}} = chart;
        const xPx = x.getPixelForValue(0);
        ctx.save();
        ctx.setLineDash([3,5]);
        ctx.strokeStyle = "#2d4a5a";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(xPx, y.top);
        ctx.lineTo(xPx, y.bottom);
        ctx.stroke();
        ctx.restore();
      }
    }]
  });
}

// ── EV Table ───────────────────────────────────────────────────────────────
function updateEVTable(prizeList, stacks, prizeScale=1) {
  const rawStacks = players.map(p => Number(p.stack));
  const evs = calcICM(rawStacks, prizeList).map(v => v / prizeScale);
  document.getElementById("ev-section").style.display = "block";
  document.getElementById("ev-list").innerHTML = players.map((p,i) => {
    const isH = i===heroIdx, isV = i===villainIdx;
    const lineStyle = isH
      ? `background: repeating-linear-gradient(90deg,${COLORS[i]} 0,${COLORS[i]} 5px,transparent 5px,transparent 8px); height:2px; width:20px`
      : `background:${COLORS[i]}; height:2px; width:20px`;
    return `
      <div class="ev-row">
        <div class="ev-line" style="${lineStyle}"></div>
        <span style="color:${COLORS[i]};font-weight:600;min-width:14px">${p.label}</span>
        <span style="color:var(--dim)">${Number(p.stack)-Number(p.dead||0)}bb</span>
        <span class="tag ${isH?'tag-hero':isV?'tag-villain':'tag-obs'}">${isH?"HERO":isV?"VIL":"OBS"}</span>
        <span style="margin-left:auto;color:#7a9ab0">${satelliteMode ? evs[i].toFixed(2)+'%' : '$'+sig4(evs[i])}</span>
      </div>`;
  }).join("");
}

// ── Bottom Panel (BF + Observers) ─────────────────────────────────────────
// Store chart data globally for cursor updates
let _chartState = null;

function updateMetrics(xLabels, heroData, heroNormalData, seriesData, prizeList, stacks, chipRange, prizeScale=1) {
  _chartState = { xLabels, heroData, heroNormalData, seriesData, prizeList, stacks, chipRange, prizeScale };
  renderBottomPanel(0); // default at delta=0
}

function sig4(v) {
  if (v === 0) return "0";
  const p = Math.floor(Math.log10(Math.abs(v)));
  const factor = Math.pow(10, 3 - p);
  return (Math.round(v * factor) / factor).toLocaleString(undefined, {maximumFractionDigits: Math.max(0, 3-p)});
}

function renderBottomPanel(cursorDelta) {
  if (!_chartState) return;
  const { xLabels, heroData, heroNormalData, seriesData, prizeList, stacks, chipRange, prizeScale=1 } = _chartState;

  // Find closest index to cursorDelta
  const steps = xLabels.length;
  let idx = 0, minDist = Infinity;
  xLabels.forEach((v, i) => { const d = Math.abs(v - cursorDelta); if (d < minDist) { minDist = d; idx = i; } });

  const delta = xLabels[idx];
  const baseEVs = calcICM(stacks, prizeList).map(v => v / prizeScale);

  // ── Local BF calculation ──
  // For a small step around cursor point
  const step = Math.max(1, Math.floor(steps / 40));
  const lo = Math.max(0, idx - step);
  const hi = Math.min(steps - 1, idx + step);

  // Hero (mirrored): hero_ev[idx] = ICM of hero when delta = -xLabels[idx]
  // gain = heroData[lo] - heroData[idx]  (moving left = hero gains on mirrored axis)
  // lose = heroData[idx] - heroData[hi]
  const heroGain = heroData[lo] - heroData[idx];
  const heroLose = heroData[idx] - heroData[hi];
  const heroBF   = heroLose > 0 && heroGain > 0 ? heroLose / heroGain : null;

  // Villain: normal direction
  const vilData  = seriesData[villainIdx];
  const vilGain  = vilData[hi] - vilData[idx];   // villain gains when delta increases (hero gains = villain loses... wait)
  // villain gains chips when delta < 0 (hero loses), so villain's EV increases going left
  const vilGain2 = vilData[lo] - vilData[idx];  // wait, villain EV goes DOWN as hero gains
  // Actually villain EV is normal: decreases as delta increases (hero gains)
  // villain gain = EV at delta going negative = vilData[lo]
  // villain lose = EV at delta going positive = vilData[hi]
  const vGain = vilData[lo] - vilData[idx];
  const vLose = vilData[idx] - vilData[hi];
  const vilBF = vLose > 0 && vGain > 0 ? vLose / vGain : null;

  // ── General BF (full range endpoints) ──
  const heroWinEV  = heroData[0];
  const heroLoseEV = heroData[steps - 1];
  const heroBaseEV = baseEVs[heroIdx];
  const heroGenGain = heroWinEV - heroBaseEV;
  const heroGenLose = heroBaseEV - heroLoseEV;
  const heroGenBF   = heroGenLose > 0 && heroGenGain > 0 ? heroGenLose / heroGenGain : null;

  const vilBaseEV  = baseEVs[villainIdx];
  const vilWinEV   = vilData[0];
  const vilLoseEV  = vilData[steps - 1];
  const vilGenGain = vilWinEV - vilBaseEV;
  const vilGenLose = vilBaseEV - vilLoseEV;
  const vilGenBF   = vilGenLose > 0 && vilGenGain > 0 ? vilGenLose / vilGenGain : null;

  // ── Observer changes ──
  const heroP = players[heroIdx];
  const vilP  = players[villainIdx];

  const obsIndices = players.map((_,i)=>i).filter(i => i !== heroIdx && i !== villainIdx);

  // ── Render ──
  const fmt = v => v !== null ? v.toFixed(3) : "—";
  const fmtD = v => (v >= 0 ? "+" : "-") + "$" + sig4(Math.abs(v));
  const fmtDol = v => "$" + sig4(v);
  const bfColor = bf => bf === null ? "#7a9ab0" : bf > 1.2 ? "#ef5350" : bf > 1.05 ? "#ffa726" : "#66bb6a";

  // Cumulative BF for hero
  // heroNormalData[i] = hero EV when xLabels[i] chips are transferred hero→villain
  //   xLabels[i] < 0  →  hero GAINS chips  →  EV > baseEV
  //   xLabels[i] > 0  →  hero LOSES chips  →  EV < baseEV
  const absDeltaNum = Math.abs(delta);
  const absDelta = absDeltaNum.toFixed(1);
  // lose: xLabels = -absDeltaNum → hero LOSES (deltaが負 = villainがチップを失う = heroが得る... 待って)
  // 再確認: xLabels[i] = delta = hero→villainのチップ移動量
  //   delta < 0 → heroがvillainからチップを得る → hero EV 上がる
  //   delta > 0 → heroがvillainにチップを失う → hero EV 下がる
  // heroNormalData[i] at xLabels[i]=+absDeltaNum → hero LOST absDeltaNum → EV LOW
  // heroNormalData[i] at xLabels[i]=-absDeltaNum → hero GAINED absDeltaNum → EV HIGH
  // cumGain = EV_gained - EV_base = heroNormalData[negIdx] - base  (should be +)
  // cumLose = EV_base - EV_lost  = base - heroNormalData[posIdx]   (should be +)
  // BF = cumLose / cumGain  (should be > 1)
  // 累積BF: カーソル位置のEVを直接使う
  // heroNormalData[idx]: カーソル位置でのhero EV（そのままの方向）
  // heroData[idx]:       カーソル位置でのhero EV（反転線 = 同量だけ逆方向に動いた場合）
  // delta > 0 → heroが得る → heroNormalData[idx] > base → cumGain
  // delta < 0 → heroが失う → heroNormalData[idx] < base → cumLose
  // 常にidxそのままの値と反転した値を使う
  // 累積BF: 常に|delta|bbの価値を計算（左右対称）
  // posIdx: xLabels=+absDeltaNum → heroNormalData[posIdx] = hero gained absDelta chips
  // negIdx: xLabels=-absDeltaNum → heroNormalData[negIdx] = hero lost absDelta chips
  let cumPosIdx = 0, cumPosDist = Infinity;
  let cumNegIdx = 0, cumNegDist = Infinity;
  for (let ii = 0; ii < xLabels.length; ii++) {
    const dp = Math.abs(xLabels[ii] - absDeltaNum);
    if (dp < cumPosDist) { cumPosDist = dp; cumPosIdx = ii; }
    const dn = Math.abs(xLabels[ii] - (-absDeltaNum));
    if (dn < cumNegDist) { cumNegDist = dn; cumNegIdx = ii; }
  }
  const heroCumGain = heroNormalData[cumPosIdx] - heroBaseEV;  // gained absDelta → EV high
  const heroCumLose = heroBaseEV - heroNormalData[cumNegIdx];  // lost absDelta   → EV low
  const heroCumBF = absDeltaNum > 0 && heroCumGain > 0 && heroCumLose > 0
    ? heroCumLose / heroCumGain : null;

  // Card 1: Hero local BF

  const heroCard = `
    <div class="bf-card" style="border-color:${COLORS[heroIdx]}33">
      <div class="bf-card-title" style="color:${COLORS[heroIdx]}">▶ HERO — ${heroP.label} (${Number(heroP.stack)-Number(heroP.dead||0)}bb)</div>
      <div class="cursor-pos">局所BF @ ${delta > 0 ? "+" : ""}${delta.toFixed(1)} BB</div>
      <div class="bf-row"><span class="label">得る価値 (+${(xLabels[hi]-xLabels[idx]).toFixed(1)}bb)</span><span class="val" style="color:#66bb6a">+${heroGain > 0 ? "$"+sig4(heroGain) : "—"}</span></div>
      <div class="bf-row"><span class="label">失う価値 (-${(xLabels[idx]-xLabels[lo]).toFixed(1)}bb)</span><span class="val" style="color:#ef5350">-${heroLose > 0 ? "$"+sig4(heroLose) : "—"}</span></div>
      <div class="bf-big">
        <span class="label">局所 BF</span>
        <span class="val" style="color:#ffffff">${fmt(heroBF)}</span>
      </div>
      <div class="cursor-pos" style="margin-top:10px">累積BF（0BB → ±${absDelta}BB）</div>
      <div class="bf-row"><span class="label">得る価値 (+${absDelta}bb)</span><span class="val" style="color:#66bb6a">${absDeltaNum > 0 ? "+$"+sig4(heroCumGain) : "—"}</span></div>
      <div class="bf-row"><span class="label">失う価値 (-${absDelta}bb)</span><span class="val" style="color:#ef5350">${absDeltaNum > 0 ? "-$"+sig4(heroCumLose) : "—"}</span></div>
      <div class="bf-big">
        <span class="label">累積 BF</span>
        <span class="val" style="color:#ffffff">${fmt(heroCumBF)}</span>
      </div>
    </div>`;

  // Card 2: Villain local BF
  // Cumulative BF for villain
  // Villain累積BF: 常に|delta|bbの価値（左右対称）
  // vilData: delta>0 → heroが得る = villainが失う → EV low
  //          delta<0 → heroが失う = villainが得る → EV high
  // villain gained = vilData[cumNegIdx] (xLabel=-absDelta, hero lost = villain gained)
  // villain lost   = vilData[cumPosIdx] (xLabel=+absDelta, hero gained = villain lost)
  const vilBaseEV2 = baseEVs[villainIdx];
  const vilCumGain = vilData[cumNegIdx] - vilBaseEV2;
  const vilCumLose = vilBaseEV2 - vilData[cumPosIdx];
  const vilCumBF   = absDeltaNum > 0 && vilCumGain > 0 && vilCumLose > 0
    ? vilCumLose / vilCumGain : null;

  const vilCard = `
    <div class="bf-card" style="border-color:${COLORS[villainIdx]}33">
      <div class="bf-card-title" style="color:${COLORS[villainIdx]}">▶ VILLAIN — ${vilP.label} (${Number(vilP.stack)-Number(vilP.dead||0)}bb)</div>
      <div class="cursor-pos">局所BF @ ${delta > 0 ? "+" : ""}${delta.toFixed(1)} BB</div>
      <div class="bf-row"><span class="label">得る価値 (+${(xLabels[idx]-xLabels[lo]).toFixed(1)}bb)</span><span class="val" style="color:#66bb6a">+${vGain > 0 ? "$"+sig4(vGain) : "—"}</span></div>
      <div class="bf-row"><span class="label">失う価値 (-${(xLabels[hi]-xLabels[idx]).toFixed(1)}bb)</span><span class="val" style="color:#ef5350">-${vLose > 0 ? "$"+sig4(vLose) : "—"}</span></div>
      <div class="bf-big">
        <span class="label">局所 BF</span>
        <span class="val" style="color:#ffffff">${fmt(vilBF)}</span>
      </div>
      <div class="cursor-pos" style="margin-top:10px">累積BF（0BB → ±${absDelta}BB）</div>
      <div class="bf-row"><span class="label">得る価値 (+${absDelta}bb)</span><span class="val" style="color:#66bb6a">${absDeltaNum > 0 ? "+$"+sig4(vilCumGain) : "—"}</span></div>
      <div class="bf-row"><span class="label">失う価値 (-${absDelta}bb)</span><span class="val" style="color:#ef5350">${absDeltaNum > 0 ? "-$"+sig4(vilCumLose) : "—"}</span></div>
      <div class="bf-big">
        <span class="label">累積 BF</span>
        <span class="val" style="color:#ffffff">${fmt(vilCumBF)}</span>
      </div>
    </div>`;

  // Card 3: General BF (full range, both perspectives)
  const fmtDiff = v => (v >= 0 ? "+" : "-") + "$" + sig4(Math.abs(v));
  const genCard = `
    <div class="bf-card" style="border-color:#2d4a5a">
      <div class="bf-card-title" style="color:#9dc4d8">一般 BF（全移動域）</div>
      <div class="cursor-pos">ポット開始時点基準</div>
      <div class="bf-row">
        <span class="label" style="color:${COLORS[heroIdx]}">${heroP.label} 勝利EV</span>
        <span class="val" style="color:#66bb6a">${fmtDiff(heroGenGain)}</span>
      </div>
      <div class="bf-row">
        <span class="label" style="color:${COLORS[heroIdx]}">${heroP.label} 敗北EV</span>
        <span class="val" style="color:#ef5350">${fmtDiff(-heroGenLose)}</span>
      </div>
      <div class="bf-big" style="margin-bottom:6px">
        <span class="label">${heroP.label} 目線 BF</span>
        <span class="val" style="color:#ffffff">${fmt(heroGenBF)}</span>
      </div>
      <div class="bf-row">
        <span class="label" style="color:${COLORS[villainIdx]}">${vilP.label} 勝利EV</span>
        <span class="val" style="color:#66bb6a">${fmtDiff(vilGenGain)}</span>
      </div>
      <div class="bf-row">
        <span class="label" style="color:${COLORS[villainIdx]}">${vilP.label} 敗北EV</span>
        <span class="val" style="color:#ef5350">${fmtDiff(-vilGenLose)}</span>
      </div>
      <div class="bf-big">
        <span class="label">${vilP.label} 目線 BF</span>
        <span class="val" style="color:#ffffff">${fmt(vilGenBF)}</span>
      </div>
    </div>`;

  // Card 4: Observers change from delta=0
  const midIdx = xLabels.findIndex(v => Math.abs(v) < 0.01) || Math.floor(steps/2);
  let obsHTML = "";
  if (obsIndices.length === 0) {
    obsHTML = `<div style="color:var(--muted);font-size:10px;margin-top:10px">傍観者なし</div>`;
  } else {
    obsHTML = obsIndices.map(i => {
      const baseEV = baseEVs[i];
      const curEV  = seriesData[i][idx];
      const diff   = curEV - baseEV;
      const pct    = baseEV > 0 ? ((diff / baseEV) * 100).toFixed(2) : "0";
      const col    = diff >= 0 ? "#66bb6a" : "#ef5350";
      return `
        <div class="obs-row">
          <div class="obs-name">
            <div class="obs-dot" style="background:${COLORS[i]}"></div>
            <span style="color:${COLORS[i]};font-weight:600">${players[i].label}</span>
            <span style="color:var(--dim);font-size:10px">${Number(players[i].stack)-Number(players[i].dead||0)}bb</span>
          </div>
          <div style="text-align:right">
            <span style="color:${col};font-weight:600">${fmtD(diff)}</span>
            <span style="color:${col};font-size:9px;margin-left:4px">(${diff>=0?"+":""}${pct}%)</span>
          </div>
        </div>`;
    }).join("");
  }

  const obsCard = `
    <div class="bf-card" style="border-color:#2d4a5a">
      <div class="bf-card-title" style="color:#9dc4d8">傍観者 ICM変化</div>
      <div class="cursor-pos">ポット開始時点 (0BB) からの増減 @ ${delta > 0 ? "+" : ""}${delta.toFixed(1)}BB</div>
      ${obsHTML}
    </div>`;

  document.getElementById("bottom-panel").innerHTML = heroCard + vilCard + genCard + obsCard;
}

// Hook into chart tooltip for cursor sync
function attachCursorSync() {
  const canvas = document.getElementById("myChart");
  canvas.addEventListener("mousemove", e => {
    if (!chart || !_chartState) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const xScale = chart.scales.x;
    if (!xScale) return;
    const val = xScale.getValueForPixel(x);
    if (val !== undefined) renderBottomPanel(val);
  });
  canvas.addEventListener("mouseleave", () => {
    if (_chartState) renderBottomPanel(0);
  });
}

// ── Init ───────────────────────────────────────────────────────────────────
relabelPlayers();
setPrize("mtt1000");
renderPlayerList();
generate();
attachCursorSync();
</script>
</body>
</html>
